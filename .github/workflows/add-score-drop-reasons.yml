name: Add Score Drop Reasons

on:
  workflow_dispatch:
  push:
    paths:
      - scripts/add_score_drop_reasons.py

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Add score-drop explanations
        run: python scripts/add_score_drop_reasons.py

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add lib/portfolio-alerts.ts
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Add reasoned score drop alerts"
            git push
          fi
