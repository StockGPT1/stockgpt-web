name: Build Check

on:
  workflow_dispatch:
  push:
    paths:
      - app/**
      - components/**
      - lib/**
      - package.json
      - package-lock.json
      - tsconfig.json

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
