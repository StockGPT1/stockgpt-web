name: Enforce Plan First Signup

on:
  workflow_dispatch:
  push:
    paths:
      - scripts/enforce_plan_first_signup.py

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Patch plan-first signup flow
        run: python scripts/enforce_plan_first_signup.py

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app/pricing/page.tsx app/signup/page.tsx app/login/page.tsx
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Enforce plan-first signup flow"
            git push
          fi
