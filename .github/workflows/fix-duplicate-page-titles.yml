name: Fix Duplicate Page Titles

on:
  workflow_dispatch:
  push:
    paths:
      - scripts/fix_duplicate_page_titles.py

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Add unique page metadata
        run: python scripts/fix_duplicate_page_titles.py

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Add unique SEO page titles"
            git push
          fi
