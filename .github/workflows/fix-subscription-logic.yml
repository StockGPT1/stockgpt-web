name: Fix Subscription Logic

on:
  workflow_dispatch:
  push:
    paths:
      - scripts/fix_subscription_logic.py
      - lib/subscription.ts

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Patch subscription checks
        run: python scripts/fix_subscription_logic.py

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app/page.tsx app/rankings/page.tsx app/settings/page.tsx
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Use shared subscription status logic"
            git push
          fi
