name: Improve Alert Reason Diagnostics

on:
  workflow_dispatch:
  push:
    paths:
      - scripts/improve_alert_reason_diagnostics.py

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Improve alert reasons
        run: python scripts/improve_alert_reason_diagnostics.py

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add lib/portfolio-alerts.ts
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Improve alert reason diagnostics"
            git push
          fi
