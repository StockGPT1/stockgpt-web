name: Patch Daily Move Pills

on:
  workflow_dispatch:
  push:
    paths:
      - scripts/patch_daily_move_pills.py

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Patch daily move pills
        run: python scripts/patch_daily_move_pills.py

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app/page.tsx app/rankings/page.tsx
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Add 1D price move pills to rankings"
            git push
          fi
