name: Patch UI Portfolio Issues

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Patch dashboard and portfolio issues
        run: |
          python - <<'PY'
          from pathlib import Path

          def replace_required(path: Path, old: str, new: str):
              text = path.read_text()
              if old not in text:
                  raise SystemExit(f"Expected text not found in {path}: {old[:120]}")
              path.write_text(text.replace(old, new))

          # 1) Dashboard movers label: 5d -> 1d
          page = Path('app/page.tsx')
          text = page.read_text()
          text = text.replace('>\n                  5d\n                </span>', '>\n                  1D\n                </span>')

          # 2) Remove desktop Top 10 header row that could appear as a stray ticker/company row.
          old_header = '''                  <div
                    className={`grid ${dashboardRankingsGrid} h-[27px] shrink-0 items-center bg-[#072116] text-[#faf6f0]`}
                  >
                    <div className="px-2 text-[8px] font-bold uppercase tracking-wide">
                      #
                    </div>
                    <div className="px-2 text-[8px] font-bold uppercase tracking-wide">
                      Ticker
                    </div>
                    <div className="px-2 text-[8px] font-bold uppercase tracking-wide">
                      Company
                    </div>
                    <div className="px-2 text-[8px] font-bold uppercase tracking-wide">
                      Move
                    </div>
                    <div className="hidden px-2 text-[8px] font-bold uppercase tracking-wide sm:block">
                      Sector
                    </div>
                    <div className="px-2 text-right text-[8px] font-bold uppercase tracking-wide">
                      Price
                    </div>
                    <div className="px-2 text-right text-[8px] font-bold uppercase tracking-wide">
                      Score
                    </div>
                  </div>

'''
          text = text.replace(old_header, '')
          text = text.replace('h-[10%] min-h-0 items-center', 'h-[10%] min-h-0 items-center')
          page.write_text(text)

          # 3) Portfolio logic: use rank-based percentiles everywhere and sector breadth from ranks, not score/maxScore.
          alerts = Path('lib/portfolio-alerts.ts')
          text = alerts.read_text()

          old_sector = '''async function getSectorData() {
  const supabase = await createClient();
  const { data: maxRow } = await supabase
    .from("stock_rankings").select("score")
    .order("score", { ascending: false }).limit(1).maybeSingle();
  const maxScore = Math.max(Number(maxRow?.score) || 10000, 1);
  const bullishThreshold = maxScore * 0.7;

  const { data: allStocks } = await supabase
    .from("stock_rankings").select("sector, score");

  const totalStocks = (allStocks ?? []).length || 500;

  const bySector: Record<string, { total: number; bullish: number }> = {};
  (allStocks ?? []).forEach((s) => {
    const sector = s.sector ?? "—";
    if (!bySector[sector]) bySector[sector] = { total: 0, bullish: 0 };
    bySector[sector].total++;
    if (Number(s.score) >= bullishThreshold) bySector[sector].bullish++;
  });

  const momentum: Record<string, SectorMomentum> = {};
  const bullishPct: Record<string, number> = {};
  Object.entries(bySector).forEach(([sector, { total, bullish }]) => {
    const pct = total > 0 ? Math.round((bullish / total) * 100) : 0;
    bullishPct[sector] = pct;
    if (pct >= 50) momentum[sector] = "Booming";
    else if (pct >= 35) momentum[sector] = "Strong";
    else if (pct >= 20) momentum[sector] = "Mixed";
    else if (pct >= 10) momentum[sector] = "Weak";
    else momentum[sector] = "Struggling";
  });
  return { momentum, bullishPct, maxScore, totalStocks };
}
'''
          new_sector = '''async function getSectorData() {
  const supabase = await createClient();

  const { data: allStocks } = await supabase
    .from("stock_rankings").select("sector, rank, score");

  const totalStocks = (allStocks ?? []).length || 500;
  const topQuartileRank = Math.max(1, Math.ceil(totalStocks * 0.25));
  const topHalfRank = Math.max(1, Math.ceil(totalStocks * 0.50));
  const maxScore = Math.max(...(allStocks ?? []).map((s) => Number(s.score) || 0), 1);

  const bySector: Record<string, { total: number; bullish: number; healthy: number }> = {};
  (allStocks ?? []).forEach((s) => {
    const sector = s.sector ?? "—";
    const rank = Number(s.rank);
    if (!bySector[sector]) bySector[sector] = { total: 0, bullish: 0, healthy: 0 };
    bySector[sector].total++;
    if (Number.isFinite(rank) && rank > 0 && rank <= topQuartileRank) bySector[sector].bullish++;
    if (Number.isFinite(rank) && rank > 0 && rank <= topHalfRank) bySector[sector].healthy++;
  });

  const momentum: Record<string, SectorMomentum> = {};
  const bullishPct: Record<string, number> = {};
  Object.entries(bySector).forEach(([sector, { total, bullish, healthy }]) => {
    const pct = total > 0 ? Math.round((bullish / total) * 100) : 0;
    const healthyPct = total > 0 ? Math.round((healthy / total) * 100) : 0;
    bullishPct[sector] = pct;
    if (pct >= 35) momentum[sector] = "Booming";
    else if (pct >= 25) momentum[sector] = "Strong";
    else if (healthyPct >= 45) momentum[sector] = "Mixed";
    else if (healthyPct >= 30) momentum[sector] = "Weak";
    else momentum[sector] = "Struggling";
  });
  return { momentum, bullishPct, maxScore, totalStocks };
}
'''
          if old_sector not in text:
              raise SystemExit('Could not find getSectorData block to replace')
          text = text.replace(old_sector, new_sector)

          # Fix poor-signal logic to use rank percentile: rankPercentile is 100 for rank #1, 0 for bottom.
          text = text.replace('if (p.scorePercentile < 25) {', 'if (p.rankPercentile < 25) {')
          text = text.replace('bottom ${p.scorePercentile}% of stocks', 'bottom ${100 - p.rankPercentile}% of stocks')
          text = text.replace('scorePercentile < 25', 'rankPercentile < 25')
          text = text.replace('bottom ${p.scorePercentile}%)', 'bottom ${100 - p.rankPercentile}%)')
          text = text.replace('scorePercentile: number; rank: number | null; totalStocks: number;', 'scorePercentile: number; rankPercentile: number; rank: number | null; totalStocks: number;')
          text = text.replace('top ${100 - p.scorePercentile}%', 'top ${Math.max(1, 100 - p.rankPercentile)}%')
          text = text.replace('bottom ${100 - p.scorePercentile}%', 'bottom ${100 - p.rankPercentile}%')
          text = text.replace('p.scorePercentile >= 75', 'p.rankPercentile >= 75')
          text = text.replace('p.scorePercentile >= 70', 'p.rankPercentile >= 70')
          text = text.replace('scorePercentile,', 'scorePercentile,')

          # Make recommendation derive from rank percentile rather than raw score percentile.
          text = text.replace('function deriveRecommendation(\n  alerts: HoldingAlert[],\n  positionPct: number,\n  scorePercentile: number,\n  rank: number | null,\n  totalStocks: number\n): EnrichedHolding["recommendation"] {\n  // Bottom-quartile stocks get the most decisive recommendation\n  if (scorePercentile < 25) return "Sell Immediately";',
'''function deriveRecommendation(
  alerts: HoldingAlert[],
  positionPct: number,
  scorePercentile: number,
  rank: number | null,
  totalStocks: number
): EnrichedHolding["recommendation"] {
  const rankPercentile = rank && totalStocks ? Math.max(0, Math.round(100 - ((rank - 1) / totalStocks) * 100)) : scorePercentile;
  // Bottom-quartile stocks get the most decisive recommendation
  if (rankPercentile < 25) return "Sell Immediately";''')

          alerts.write_text(text)

          # 4) SavedPortfolio: add logos next to portfolio company names and alerts rows.
          sp = Path('components/SavedPortfolio.tsx')
          text = sp.read_text()
          if 'import { StockLogo } from "@/components/StockLogo";' not in text:
              text = text.replace('import Link from "next/link";\n', 'import Link from "next/link";\nimport { StockLogo } from "@/components/StockLogo";\n')

          old_title = '''            <Link href={`/stock/${holding.ticker}`} className="hover:underline">
              <p className="mt-1 truncate text-[14px] font-bold" style={{ color: "rgba(7,33,22,0.85)" }}>
                {holding.company ?? holding.ticker}
              </p>
            </Link>'''
          new_title = '''            <Link href={`/stock/${holding.ticker}`} className="mt-1 flex min-w-0 items-center gap-2 hover:underline">
              <StockLogo ticker={holding.ticker} company={holding.company} size={22} />
              <p className="truncate text-[14px] font-bold" style={{ color: "rgba(7,33,22,0.85)" }}>
                {holding.company ?? holding.ticker}
              </p>
            </Link>'''
          text = text.replace(old_title, new_title)

          old_alert_title = '<p className="text-[13px] font-black tracking-[-0.01em]" style={{ color: "#072116" }}>{alert.title}</p>'
          new_alert_title = '<div className="flex items-center gap-2"><StockLogo ticker={holding.ticker} company={holding.company} size={18} /><p className="text-[13px] font-black tracking-[-0.01em]" style={{ color: "#072116" }}>{alert.title}</p></div>'
          text = text.replace(old_alert_title, new_alert_title)
          sp.write_text(text)
          PY

      - name: Commit patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app/page.tsx lib/portfolio-alerts.ts components/SavedPortfolio.tsx
          git commit -m "Fix portfolio percentiles sector breadth and dashboard UI"
          git push
