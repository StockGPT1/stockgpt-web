name: Restore Normal Signup Flow

on:
  workflow_dispatch:
  push:
    paths:
      - scripts/restore_normal_signup_flow.py

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Restore normal account creation
        run: python scripts/restore_normal_signup_flow.py

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app/login/page.tsx app/signup/page.tsx
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Restore normal signup flow"
            git push
          fi
