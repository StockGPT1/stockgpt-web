name: Restore Rankings Desktop Layout

on:
  workflow_dispatch:
  push:
    paths:
      - scripts/restore_rankings_desktop_layout.py

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Restore rankings desktop layout
        run: python scripts/restore_rankings_desktop_layout.py

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app/rankings/page.tsx
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Restore rankings desktop layout"
            git push
          fi
