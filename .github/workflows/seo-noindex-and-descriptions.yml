name: SEO Noindex And Descriptions

on:
  workflow_dispatch:
  push:
    paths:
      - scripts/seo_noindex_and_descriptions.py

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Add noindex metadata and public sitemap
        run: python scripts/seo_noindex_and_descriptions.py

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app public/robots.txt
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Add SEO noindex and public sitemap"
            git push
          fi
