name: Split Dashboard Mover Universes

on:
  workflow_dispatch:
  push:
    paths:
      - scripts/split_dashboard_mover_universes.py

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Split dashboard mover universes
        run: python scripts/split_dashboard_mover_universes.py

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app/page.tsx
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Split dashboard mover universes"
            git push
          fi
