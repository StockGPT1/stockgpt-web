name: Use Factor Diagnostics In Alerts

on:
  workflow_dispatch:
  push:
    paths:
      - scripts/use_factor_diagnostics_in_alerts.py

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Use factor diagnostics in alerts
        run: python scripts/use_factor_diagnostics_in_alerts.py

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add lib/portfolio-alerts.ts
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Use exact factor diagnostics in score alerts"
            git push
          fi
